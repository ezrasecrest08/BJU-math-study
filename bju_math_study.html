LESSONS[10] = [null,
  // Ch 1
  {overview:"Geometry is built on logical reasoning. You will learn the structure of mathematical proof, work with conditional statements, and use deductive reasoning to draw valid conclusions.",
  concepts:[
    {title:"Conditional Statements",body:"A conditional statement has the form 'If P, then Q' (P → Q). P is the hypothesis, Q is the conclusion. The converse switches P and Q (Q → P). The contrapositive negates and switches both (¬Q → ¬P) and is always logically equivalent to the original.",example:"Statement: 'If it rains, the ground is wet.' Converse: 'If the ground is wet, it rained.' (not necessarily true). Contrapositive: 'If the ground isn't wet, it didn't rain.' (always true)."},
    {title:"Biconditionals and Definitions",body:"A biconditional 'P if and only if Q' (P ↔ Q) is true when P and Q are both true or both false. A good mathematical definition must be a true biconditional.",example:"'A figure is a square if and only if it is a rectangle with four equal sides.'"},
    {title:"Types of Proof",body:"Two-column proof: statements in the left column, reasons in the right. Paragraph proof: written as narrative text. Both use definitions, postulates, and previously proven theorems as reasons.",example:"Two-column: Given ∠A + ∠B = 90°. Statement: ∠A and ∠B are complementary. Reason: Definition of complementary angles."},
    {title:"Counterexamples",body:"A counterexample disproves a universal statement by providing one specific example where the statement is false.",example:"Statement: 'All prime numbers are odd.' Counterexample: 2 is prime and even. ∴ The statement is false."}
  ],
  formulas:[{name:"Conditional",formula:"If P then Q → written P → Q"},{name:"Contrapositive",formula:"If ¬Q then ¬P (logically equivalent to P → Q)"}]},

  // Ch 2
  {overview:"Points, lines, and angles are the building blocks of geometry. You will classify angles, identify angle relationships formed by intersecting lines, and use the segment and angle addition postulates.",
  concepts:[
    {title:"Basic Angle Relationships",body:"Complementary angles sum to 90°. Supplementary angles sum to 180°. Vertical angles are formed by two intersecting lines and are always congruent. Linear pairs are adjacent angles that form a straight line (sum = 180°).",example:"Lines intersect forming angles of 65° and x. If they're supplementary: 65+x=180 → x=115°."},
    {title:"Angle and Segment Bisectors",body:"A bisector divides a segment or angle into two equal parts. The midpoint bisects a segment. An angle bisector creates two congruent angles.",example:"If BD bisects ∠ABC = 80°, then ∠ABD = ∠DBC = 40°."},
    {title:"Segment Addition Postulate",body:"If B is between A and C on a line, then AB + BC = AC. This can be used to find unknown lengths.",example:"A—B—C where AB = 3x+1, BC = x+5, and AC = 18: (3x+1)+(x+5) = 18 → 4x+6 = 18 → x = 3."}
  ],
  formulas:[{name:"Complementary",formula:"∠A + ∠B = 90°"},{name:"Supplementary",formula:"∠A + ∠B = 180°"},{name:"Vertical Angles",formula:"∠1 ≅ ∠3 (opposite angles)"}]},

  // Ch 3
  {overview:"Parallel lines cut by a transversal create special angle pairs with predictable relationships. You will identify these angle pairs and use them to solve problems and prove lines parallel.",
  concepts:[
    {title:"Parallel Line Angle Pairs",body:"When a transversal crosses two parallel lines, it creates corresponding angles (equal), alternate interior angles (equal), alternate exterior angles (equal), and co-interior angles (supplementary, adding to 180°).",example:"Two parallel lines cut by a transversal. If one angle is 65°, its alternate interior angle = 65°, its co-interior angle = 180°−65° = 115°."},
    {title:"Proving Lines Parallel",body:"You can prove lines parallel if you can show: corresponding angles are equal, alternate interior angles are equal, or co-interior angles are supplementary.",example:"If ∠3 = ∠7 (corresponding angles equal) → the lines are parallel."},
    {title:"Slopes and Parallel/Perpendicular Lines",body:"Parallel lines have equal slopes. Perpendicular lines have slopes that are negative reciprocals (m₁ × m₂ = −1).",example:"Lines with slopes 3 and 3 are parallel. Lines with slopes 2 and −½ are perpendicular."}
  ],
  formulas:[{name:"Parallel lines",formula:"Corresponding ∠s =, Alt. Int. ∠s =, Co-int. ∠s supplementary"},{name:"Perpendicular slopes",formula:"m₁ × m₂ = −1"}]},

  // Ch 4
  {overview:"Triangles are the most fundamental polygon. You will use the triangle angle sum theorem, the exterior angle theorem, and triangle inequalities to find unknown measures.",
  concepts:[
    {title:"Triangle Angle Sum Theorem",body:"The sum of the three interior angles of any triangle is always 180°. This is one of the most-used theorems in geometry.",example:"Triangle with angles 47° and 83°: third angle = 180° − 47° − 83° = 50°."},
    {title:"Exterior Angle Theorem",body:"An exterior angle of a triangle equals the sum of the two non-adjacent interior angles (the remote interior angles).",example:"Exterior angle = 110°, one remote interior angle = 60°. The other = 110° − 60° = 50°."},
    {title:"Triangle Inequality Theorem",body:"The sum of any two sides of a triangle must be greater than the third side. This limits which three lengths can form a triangle.",example:"Can sides 3, 5, 9 form a triangle? 3+5=8 < 9. No — they cannot form a triangle."},
    {title:"Isosceles and Equilateral Triangles",body:"Isosceles triangles have two equal sides and two equal base angles. Equilateral triangles have all three sides equal and all angles equal to 60°.",example:"Isosceles with vertex angle 40°: base angles = (180°−40°)/2 = 70° each."}
  ],
  formulas:[{name:"Triangle Angle Sum",formula:"∠A + ∠B + ∠C = 180°"},{name:"Exterior Angle",formula:"Exterior ∠ = sum of two remote interior ∠s"}]},

  // Ch 5
  {overview:"Two triangles are congruent if all corresponding sides and angles are equal. You will use congruence postulates (SSS, SAS, ASA, AAS, HL) to prove triangles congruent without measuring all six parts.",
  concepts:[
    {title:"Congruence Postulates",body:"SSS: all three sides equal. SAS: two sides and the included angle. ASA: two angles and the included side. AAS: two angles and a non-included side. HL: hypotenuse and leg (right triangles only).",example:"SSS: △ABC≅△DEF if AB=DE, BC=EF, AC=DF."},
    {title:"CPCTC",body:"Once triangles are proven congruent, Corresponding Parts of Congruent Triangles are Congruent (CPCTC). Use this to prove individual parts equal after proving the triangles congruent.",example:"Prove △ABD ≅ △CBD by SAS, then conclude AB = CB by CPCTC."},
    {title:"Proof Strategy",body:"To write a congruence proof: (1) Mark the diagram with given information. (2) Identify which postulate to use. (3) Gather the required pieces (sides/angles) as statements with reasons.",example:"Given: AB||CD, M is midpoint of AC. Prove triangles congruent using AAS."}
  ],
  formulas:[{name:"Congruence Postulates",formula:"SSS, SAS, ASA, AAS, HL"}]},

  // Ch 6
  {overview:"Quadrilaterals have four sides. You will study parallelograms, rectangles, rhombi, squares, and trapezoids — learning their properties and using them to solve problems.",
  concepts:[
    {title:"Properties of Parallelograms",body:"Opposite sides are parallel and congruent. Opposite angles are congruent. Consecutive angles are supplementary. Diagonals bisect each other.",example:"Parallelogram ABCD: AB||CD, AB=CD, ∠A+∠B=180°, diagonals bisect each other."},
    {title:"Special Parallelograms",body:"Rectangle: all angles 90°, diagonals equal. Rhombus: all sides equal, diagonals perpendicular bisectors of each other. Square: all properties of both rectangle and rhombus.",example:"A rhombus with diagonals 10 and 24: Area = (10×24)/2 = 120 square units."},
    {title:"Trapezoids",body:"A trapezoid has exactly one pair of parallel sides (bases). The median (midsegment) of a trapezoid is parallel to both bases and its length equals half the sum of the bases.",example:"Trapezoid with bases 6 and 10: median = (6+10)/2 = 8."}
  ],
  formulas:[{name:"Rhombus Area",formula:"A = (d₁ × d₂) / 2"},{name:"Trapezoid Median",formula:"m = (b₁ + b₂) / 2"}]},

  // Ch 7
  {overview:"Similar figures have the same shape but different sizes. You will identify similar polygons, use ratios and proportions in similar triangles, and apply similarity in real-world contexts.",
  concepts:[
    {title:"Similar Polygons",body:"Two polygons are similar (~) if corresponding angles are congruent AND corresponding sides are proportional. The ratio of corresponding sides is the scale factor.",example:"△ABC ~ △DEF with AB/DE = BC/EF = AC/DF = 2/3 (scale factor 2:3)."},
    {title:"Triangle Similarity Postulates",body:"AA: two pairs of congruent angles. SAS~: two pairs of proportional sides and included congruent angle. SSS~: all three pairs of sides proportional.",example:"If ∠A = ∠D and ∠B = ∠E, then △ABC ~ △DEF by AA."},
    {title:"Using Proportions",body:"Set up a proportion using corresponding sides, then solve for the unknown. In similar triangles, angle bisectors, altitudes, and medians are also proportional.",example:"△ABC ~ △DEF, AB=6, DE=9, BC=8. Find EF: 6/9 = 8/EF → EF = 12."},
    {title:"Indirect Measurement",body:"Use similarity to find heights or distances that cannot be measured directly. Two similar triangles formed by shadows or reflections give you a proportion to solve.",example:"A 6-ft person casts a 4-ft shadow. A tree casts a 20-ft shadow. Tree height: 6/4 = h/20 → h = 30 ft."}
  ],
  formulas:[{name:"Similarity ratio",formula:"AB/DE = BC/EF = AC/DF = scale factor"}]},

  // Ch 8
  {overview:"The Pythagorean theorem and trigonometry relate the sides and angles of right triangles. You will use these tools to find unknown sides and angles in right triangles.",
  concepts:[
    {title:"Pythagorean Theorem",body:"In a right triangle with legs a and b and hypotenuse c: a² + b² = c². The hypotenuse is always the longest side, opposite the right angle. Pythagorean triples (like 3-4-5, 5-12-13) are worth memorizing.",example:"Legs 6 and 8: c² = 36+64 = 100, c = 10.   Leg 5 and hyp 13: b² = 169−25 = 144, b = 12."},
    {title:"Special Right Triangles",body:"45°-45°-90°: legs equal, hypotenuse = leg × √2. 30°-60°-90°: short leg = s, long leg = s√3, hypotenuse = 2s. Knowing these ratios lets you solve quickly without the full Pythagorean theorem.",example:"45-45-90 with leg 5: hypotenuse = 5√2. 30-60-90 with short leg 4: long leg = 4√3, hypotenuse = 8."},
    {title:"Trigonometric Ratios",body:"In a right triangle with acute angle θ: sin θ = opposite/hypotenuse (SOH), cos θ = adjacent/hypotenuse (CAH), tan θ = opposite/adjacent (TOA). Memory aid: SOH-CAH-TOA.",example:"In a right triangle: opposite=3, hypotenuse=5. sin θ = 3/5 = 0.6. θ = arcsin(0.6) ≈ 36.9°."},
    {title:"Solving Right Triangles",body:"Use trig ratios when you know one side and one acute angle (or two sides). Use arcsin/arccos/arctan to find angles from ratios. Always check that your answer makes sense.",example:"Angle 30°, adjacent = 10. Find opposite: tan(30°) = opposite/10 → opposite = 10×tan(30°) ≈ 5.77."}
  ],
  formulas:[{name:"Pythagorean Theorem",formula:"a² + b² = c²"},{name:"SOH-CAH-TOA",formula:"sin=opp/hyp, cos=adj/hyp, tan=opp/adj"}]},

  // Ch 9
  {overview:"Circles have unique properties based on their center, radius, chords, arcs, and angles. You will find circumference and area, work with arc length and sector area, and study inscribed angles.",
  concepts:[
    {title:"Circle Vocabulary",body:"Radius (r): center to edge. Diameter (d = 2r): all the way across. Chord: connects two points on the circle. Arc: part of the circle. Central angle: vertex at center. Inscribed angle: vertex on the circle.",example:"Central angle 60° in a circle with r=5: it intercepts an arc of 60°."},
    {title:"Circumference and Area",body:"Circumference (perimeter of a circle): C = 2πr = πd. Area: A = πr². Use π ≈ 3.14159 or leave answers in terms of π for exact form.",example:"Circle r=7: C = 14π ≈ 43.98. A = 49π ≈ 153.94."},
    {title:"Arc Length and Sector Area",body:"Arc length = (central angle / 360°) × 2πr. Sector area = (central angle / 360°) × πr². The fraction represents what part of the full circle the sector covers.",example:"90° sector, r=6: arc = (90/360)×2π×6 = 3π. Area = (90/360)×π×36 = 9π."},
    {title:"Inscribed Angle Theorem",body:"An inscribed angle (vertex on circle) equals half the central angle intercepting the same arc. A corollary: any inscribed angle that intercepts a semicircle is 90°.",example:"Inscribed angle intercepts arc of 80°: inscribed angle = 80°/2 = 40°."}
  ],
  formulas:[{name:"Circumference",formula:"C = 2πr"},{name:"Area of Circle",formula:"A = πr²"},{name:"Arc Length",formula:"L = (θ/360°) × 2πr"},{name:"Sector Area",formula:"A = (θ/360°) × πr²"}]},

  // Ch 10
  {overview:"Area formulas for polygons extend what you know about rectangles and triangles. You will find areas of parallelograms, trapezoids, regular polygons, and composite figures.",
  concepts:[
    {title:"Areas of Quadrilaterals",body:"Parallelogram: A = bh (h is perpendicular height). Trapezoid: A = ½(b₁+b₂)h. Rhombus/kite: A = ½d₁d₂ (half product of diagonals).",example:"Trapezoid with bases 8 and 12, height 5: A = ½(8+12)(5) = ½(20)(5) = 50."},
    {title:"Regular Polygons",body:"A regular polygon has all equal sides and angles. Area = ½ × apothem × perimeter. The apothem is the perpendicular distance from center to any side.",example:"Regular hexagon with side 6: perimeter = 36, apothem = 6×(√3/2) = 3√3. Area = ½(3√3)(36) = 54√3 ≈ 93.5."},
    {title:"Composite Figures",body:"Composite figures are made up of simpler shapes. Find areas of individual parts and add them (or subtract for cut-out areas).",example:"An L-shaped figure: split into two rectangles, find each area, then add."}
  ],
  formulas:[{name:"Parallelogram",formula:"A = bh"},{name:"Trapezoid",formula:"A = ½(b₁+b₂)h"},{name:"Regular Polygon",formula:"A = ½ × apothem × perimeter"}]},

  // Ch 11
  {overview:"3D figures (solids) have both surface area and volume. You will calculate these for prisms, cylinders, pyramids, cones, and spheres.",
  concepts:[
    {title:"Prisms and Cylinders",body:"Lateral area = perimeter of base × height. Surface area = 2(area of base) + lateral area. Volume = area of base × height.",example:"Rectangular prism l=4, w=3, h=6: V=72, SA=2(12)+2(24)+2(18)=108."},
    {title:"Pyramids and Cones",body:"Volume = ⅓ × base area × height. For a cone: V = ⅓πr²h. Slant height (l) is used for lateral area, not height.",example:"Cone r=3, h=4, slant l=5: V = ⅓π(9)(4) = 12π. Lateral SA = πrl = 15π. Total SA = 15π + 9π = 24π."},
    {title:"Spheres",body:"Surface area = 4πr². Volume = (4/3)πr³.",example:"Sphere r=3: SA = 4π(9) = 36π. V = (4/3)π(27) = 36π. (For r=3, SA = V numerically.)"}
  ],
  formulas:[{name:"Sphere SA",formula:"SA = 4πr²"},{name:"Sphere Volume",formula:"V = (4/3)πr³"},{name:"Cone Volume",formula:"V = ⅓πr²h"},{name:"Cylinder Volume",formula:"V = πr²h"}]},

  // Ch 12
  {overview:"Transformations are ways of moving or resizing figures. You will perform and describe reflections, rotations, translations, dilations, and identify symmetry in figures.",
  concepts:[
    {title:"Reflections",body:"A reflection flips a figure over a line (line of reflection). Over the x-axis: (x,y)→(x,−y). Over the y-axis: (x,y)→(−x,y). Over y=x: (x,y)→(y,x).",example:"Reflect (3,4) over the y-axis → (−3,4)."},

  ],
  formulas:[{name:"Reflection over x-axis",formula:"(x, y) → (x, −y)"},{name:"Reflection over y-axis",formula:"(x, y) → (−x, y)"},{name:"90° CCW rotation",formula:"(x, y) → (−y, x)"}]},

LESSONS[11] = [null,
  // Ch 1
  {overview:"Relations and functions form the foundation of higher mathematics. You will analyze functions using function notation, evaluate compositions, find inverses, and study domain and range.",
  concepts:[
    {title:"Function Notation",body:"f(x) is read 'f of x' and means the output when x is the input. To evaluate f(a), substitute a for x everywhere in the formula.",example:"f(x) = 2x²−3x: f(4) = 2(16)−3(4) = 32−12 = 20."},
    {title:"Domain and Range",body:"The domain is the set of all valid inputs. The range is the set of all possible outputs. Restrictions: square roots require radicand ≥ 0; fractions require denominator ≠ 0.",example:"f(x) = √(x−3): domain is x ≥ 3 (i.e. [3,∞))."},
    {title:"Composition of Functions",body:"The composition (f ∘ g)(x) = f(g(x)) — apply g first, then f. Order matters: f ∘ g ≠ g ∘ f in general.",example:"f(x)=x+1, g(x)=2x: (f∘g)(3) = f(g(3)) = f(6) = 7."},
    {title:"Inverse Functions",body:"The inverse function f⁻¹ undoes f. To find: replace f(x) with y, swap x and y, solve for y. The graphs of f and f⁻¹ are reflections over the line y=x.",example:"f(x)=2x+1: swap → x=2y+1 → y=(x−1)/2 → f⁻¹(x)=(x−1)/2."}
  ],
  formulas:[{name:"Composition",formula:"(f ∘ g)(x) = f(g(x))"},{name:"Inverse",formula:"Swap x and y, then solve for y"}]},

  // Ch 2
  {overview:"Linear functions in Algebra 2 are reviewed and extended. You will write equations in all forms, graph using transformations, and explore absolute value functions.",
  concepts:[
    {title:"Forms of Linear Equations Review",body:"Slope-intercept: y=mx+b. Point-slope: y−y₁=m(x−x₁). Standard: Ax+By=C. Being fluent in all three forms lets you work with any given information.",example:"Given two points: use slope formula, then point-slope form."},
    {title:"Absolute Value Functions",body:"The graph of y=|x| is a V-shape with vertex at the origin. Transformations: y=a|x−h|+k shifts the vertex to (h,k) and stretches by factor |a|. If a<0, the V opens downward.",example:"y=2|x−3|+1: vertex at (3,1), V opens upward, stretched by 2."},
    {title:"Solving Absolute Value Equations",body:"Split into two equations: |x−a|=b means x−a=b or x−a=−b. Solve both and check solutions.",example:"|2x−3|=7: 2x−3=7→x=5 or 2x−3=−7→x=−2."}
  ],
  formulas:[{name:"Absolute Value Vertex Form",formula:"y = a|x − h| + k, vertex (h, k)"}]},

  concepts:[

  // Ch 4
  {overview:"Matrices are rectangular arrays of numbers. You will perform matrix operations, find determinants, and use matrices to solve systems of equations.",
  concepts:[
    {title:"Matrix Operations",body:"Addition/subtraction: add/subtract corresponding entries (matrices must have the same dimensions). Scalar multiplication: multiply every entry by the scalar.",example:"[1 2; 3 4] + [5 6; 7 8] = [6 8; 10 12]."},
    {title:"Matrix Multiplication",body:"Multiply row of first matrix by column of second. The (i,j) entry of the product = dot product of row i and column j. Dimensions: m×n times n×p gives m×p result.",example:"[1 2; 3 4] × [2; 1] = [1×2+2×1; 3×2+4×1] = [4; 10]."},
    {title:"Determinant and Inverse",body:"For a 2×2 matrix [a b; c d]: det = ad − bc. The matrix is invertible if det ≠ 0. The inverse: (1/det) × [d −b; −c a].",example:"[3 2; 1 4]: det = 12−2 = 10. Invertible ✓. Inverse = (1/10)[4 −2; −1 3]."},
    {title:"Solving Systems with Matrices",body:"Write the system as AX = B. Solution: X = A⁻¹B. Or use Cramer's Rule: each variable equals a specific determinant divided by det(A).",example:"System x+2y=5, 3x+4y=6: A=[1 2;3 4], B=[5;6]. X = A⁻¹B."}

  formulas:[{name:"2×2 Determinant",formula:"det[a b; c d] = ad − bc"},{name:"Cramer's Rule",formula:"x = det(Aₓ)/det(A), y = det(Aᵧ)/det(A)"}]},

  // Ch 5
  {overview:"Quadratic functions are analyzed in depth. You will convert between standard and vertex form, complete the square, analyze the discriminant, and solve quadratics in all ways.",
  concepts:[
    {title:"Vertex Form and Transformations",body:"y = a(x−h)²+k: vertex at (h,k). a>0 opens upward (minimum), a<0 opens downward (maximum). |a|>1 narrows the parabola; |a|<1 widens it.",example:"y = −2(x+1)²+3: vertex (−1,3), maximum, opens downward, narrower than y=x²."},
    {title:"Completing the Square",body:"Start with y = ax²+bx+c. Factor out a from first two terms. Add and subtract (b/(2a))² inside. Rewrite as vertex form.",example:"y = x²+6x+2: y = (x²+6x+9)−9+2 = (x+3)²−7. Vertex: (−3,−7)."},
    {title:"The Discriminant",body:"In ax²+bx+c=0, the discriminant D = b²−4ac tells you about the roots: D>0 → two distinct real roots; D=0 → one repeated real root; D<0 → two complex (non-real) roots.",example:"x²−4x+4=0: D=16−16=0 → one repeated root x=2."}

  formulas:[{name:"Vertex Form",formula:"y = a(x−h)² + k"},{name:"Discriminant",formula:"D = b² − 4ac"}]},

  // Ch 6
  {overview:"Polynomial functions of degree 3 and higher are analyzed using key theorems. You will divide polynomials, find rational roots, and analyze end behavior and zeros.",
  concepts:[
    {title:"Polynomial Division",body:"Long division works like numerical long division. Synthetic division is a shortcut for dividing by (x−c): write coefficients, bring down, multiply by c, add, repeat.",example:"Divide x³−2x+1 by (x−1) using synthetic division with c=1: coefficients [1,0,−2,1] → result: x²+x−1, remainder 0."},
    {title:"Remainder and Factor Theorems",body:"Remainder Theorem: dividing p(x) by (x−c) gives remainder = p(c). Factor Theorem: (x−c) is a factor of p(x) if and only if p(c) = 0.",example:"Is (x−2) a factor of x³−3x+2? p(2) = 8−6+2 = 4 ≠ 0. No."},
    {title:"Rational Root Theorem",body:"If p(x) has integer coefficients, rational roots must be factors of the constant term divided by factors of the leading coefficient (±p/q).",example:"x³−2x²−5x+6: possible rational roots = ±1,±2,±3,±6. Test: p(1)=0 ✓. Factor out (x−1)."}
  ],
  formulas:[{name:"Remainder Theorem",formula:"Remainder when dividing by (x−c) = f(c)"},{name:"Factor Theorem",formula:"(x−c) is a factor ↔ f(c) = 0"}]},

  // Ch 7
  {overview:"Rational functions are ratios of polynomials. You will identify domains, asymptotes, and holes, graph rational functions, and solve rational equations and inequalities.",
  concepts:[
    {title:"Vertical and Horizontal Asymptotes",body:"Vertical asymptotes: set denominator = 0 (check that numerator ≠ 0 there). Horizontal asymptotes depend on degrees: if deg(num)<deg(den): y=0; if equal: y = leading coefficients ratio; if num>den: no horizontal asymptote.",example:"f(x) = 2x/(x−3): vertical asymptote x=3, horizontal asymptote y=2/1=2."},
    {title:"Holes",body:"A hole occurs when a factor cancels from both numerator and denominator. The hole is at the x-value that makes the cancelled factor zero.",example:"f(x) = (x−2)(x+1)/[(x−2)(x−3)]: hole at x=2, vertical asymptote at x=3."},
    {title:"Solving Rational Equations",body:"Multiply all terms by the LCD to clear fractions. Solve, then exclude any values that made the original denominator zero.",example:"2/x + 3/(x+1) = 1: LCD = x(x+1). Multiply through: 2(x+1)+3x = x(x+1) → 5x+2 = x²+x → x²−4x−2=0."}
  ],
  formulas:[{name:"Vertical Asymptote",formula:"Set denominator = 0 (if not cancelled)"},{name:"Horizontal Asymptote",formula:"Compare degrees of numerator and denominator"}]},

  concepts:[
    {title:"Exponential Functions",body:"f(x) = aˣ (a>0, a≠1). If a>1: exponential growth. If 0<a<1: exponential decay. The graph passes through (0,1) and has a horizontal asymptote at y=0.",example:"f(x)=2ˣ: passes through (0,1),(1,2),(2,4),(−1,½)."},
    {title:"Logarithms",body:"logₐ(x)=y means aʸ=x. Logarithm is the inverse of the exponential function. Common log: log(x)=log₁₀(x). Natural log: ln(x)=logₑ(x) where e≈2.718.",example:"log₂(8)=3 because 2³=8. ln(e²)=2."},
    {title:"Laws of Logarithms",body:"Product: log(AB)=log A+log B. Quotient: log(A/B)=log A−log B. Power: log(Aⁿ)=n·log A. Change of base: logₐ(x) = log(x)/log(a).",example:"log₂(32) = log₂(2⁵) = 5. Or: log(32)/log(2) = 1.505/0.301 = 5."},

  {overview:"Radical functions involve roots. You will graph radical functions, determine their domains, solve radical equations, and work with rational (fractional) exponents.",

    {title:"Rational Exponents",body:"x^(m/n) = (ⁿ√x)ᵐ = ⁿ√(xᵐ). The denominator is the root; the numerator is the power. All exponent rules apply to rational exponents.",example:"8^(2/3) = (³√8)² = 2² = 4."},
    {title:"Solving Radical Equations",body:"Isolate the radical, then raise both sides to the appropriate power to eliminate it. For nth roots, raise to the nth power. Always check solutions for extraneous roots.",example:"√(3x−2) + 4 = 7: √(3x−2) = 3; square both → 3x−2 = 9 → x = 11/3."}

  {overview:"Complex numbers extend the real number system to include solutions to equations like x²+1=0. You will perform operations with complex numbers, find modulus, and use them in solving quadratics.",
  concepts:[
    {title:"The Imaginary Unit",body:"i = √(−1), so i² = −1, i³ = −i, i⁴ = 1. Powers of i cycle with period 4. A complex number has the form a+bi where a is the real part and b is the imaginary part.",example:"i⁵ = i⁴ × i = 1 × i = i. i¹⁰ = (i⁴)² × i² = 1 × (−1) = −1."},
    {title:"Operations with Complex Numbers",body:"Add/subtract: combine real parts, combine imaginary parts. Multiply: use FOIL, replacing i²=−1. Divide: multiply numerator and denominator by the complex conjugate of the denominator.",example:"(3+2i)(1−i) = 3−3i+2i−2i² = 3−i+2 = 5−i."},
    {title:"Modulus and Complex Conjugate",body:"The modulus (absolute value): |a+bi| = √(a²+b²). The complex conjugate of a+bi is a−bi. Their product = a²+b² (always real). Used for division.",example:"|3+4i| = √(9+16) = √25 = 5."}
  ],
  formulas:[{name:"i² = −1",formula:"i = √(−1), i² = −1, i³ = −i, i⁴ = 1"},{name:"Modulus",formula:"|a+bi| = √(a² + b²)"}]},

  // Ch 11
  {overview:"Sequences and series include arithmetic and geometric types. You will also study the binomial theorem and understand summation notation (sigma notation).",

    {title:"Sigma Notation",body:"Σ (sigma) notation is a compact way to write sums. Σᵢ₌₁ⁿ aᵢ means 'sum of aᵢ from i=1 to n.' The index variable i takes each integer value in turn.",example:"Σᵢ₌₁³ (2i) = 2(1)+2(2)+2(3) = 2+4+6 = 12."},
    {title:"Infinite Geometric Series",body:"An infinite geometric series converges (has a finite sum) only when |r| < 1. Sum: S = a₁/(1−r). If |r| ≥ 1, the series diverges (no finite sum).",example:"1 + ½ + ¼ + … : a₁=1, r=½. S = 1/(1−½) = 2."},
    {title:"Binomial Theorem",body:"(a+b)ⁿ can be expanded using Pascal's Triangle or the binomial coefficients C(n,k). (a+b)ⁿ = Σₖ₌₀ⁿ C(n,k) aⁿ⁻ᵏ bᵏ.",example:"(x+1)³ = x³+3x²+3x+1 (from Pascal row: 1,3,3,1)."}

  formulas:[{name:"Infinite Geometric Sum",formula:"S = a₁/(1−r), |r|<1"},{name:"Binomial Theorem",formula:"(a+b)ⁿ = Σ C(n,k) aⁿ⁻ᵏ bᵏ"}]},

  // Ch 12
  {overview:"Trigonometry studies relationships between angles and sides. You will use the unit circle to define trig functions for all angles, graph trig functions, and apply the Law of Sines and Law of Cosines.",
  concepts:[
    {title:"Unit Circle",body:"The unit circle has radius 1 centered at the origin. Any angle θ corresponds to a point (cos θ, sin θ). This defines sin and cos for all angles, not just acute angles in triangles.",example:"cos(90°)=0, sin(90°)=1. cos(180°)=−1, sin(180°)=0. Memorize the key angles: 0°,30°,45°,60°,90°."},
    {title:"Graphing Trig Functions",body:"y=A sin(Bx+C)+D: Amplitude=|A|, Period=2π/B, Phase shift=−C/B, Vertical shift=D. The same parameters apply to cosine and tangent functions.",example:"y=3sin(2x): amplitude=3, period=2π/2=π."},

    {title:"Law of Cosines",body:"c² = a²+b²−2ab cos C. Use when you know SAS or SSS. It generalizes the Pythagorean theorem.",example:"a=7, b=9, C=60°: c² = 49+81−2(7)(9)(0.5) = 130−63 = 67. c = √67 ≈ 8.19."}
  ],

  {overview:"Conic sections are curves formed by cutting a cone with a plane: circles, ellipses, hyperbolas, and parabolas. You will identify, graph, and write equations for each.",
  concepts:[
    {title:"Circles",body:"Standard form: (x−h)²+(y−k)²=r². Center (h,k), radius r. To graph: plot center, mark points r units away in 4 directions, sketch circle.",example:"(x−2)²+(y+3)²=25: center (2,−3), radius 5."},
    {title:"Ellipses",body:"Standard form: (x−h)²/a² + (y−k)²/b² = 1. Center (h,k). If a>b: major axis is horizontal (length 2a). Foci: c²=a²−b², located along the major axis.",example:"x²/25 + y²/9 = 1: a=5, b=3, c=√16=4. Foci at (±4,0)."},
    {title:"Hyperbolas",body:"Standard form: (x−h)²/a² − (y−k)²/b² = 1 (opens left/right). Asymptotes: y−k = ±(b/a)(x−h). c²=a²+b².",example:"x²/9 − y²/4 = 1: a=3, b=2, asymptotes y = ±(2/3)x."},
    {title:"Parabolas",body:"Vertical: (x−h)²=4p(y−k), opens up if p>0, down if p<0. Focus at (h,k+p). Horizontal: (y−k)²=4p(x−h), focus at (h+p,k).",example:"x²=8y: 4p=8, p=2. Opens upward, focus at (0,2)."}
  ],
  formulas:[{name:"Circle",formula:"(x−h)²+(y−k)²=r²"},{name:"Ellipse",formula:"(x−h)²/a²+(y−k)²/b²=1"},{name:"Hyperbola",formula:"(x−h)²/a²−(y−k)²/b²=1"}]},

  // Ch 8
  {overview:"This chapter introduces the foundational concepts of calculus: limits, continuity, and derivatives. These ideas are the starting point for understanding instantaneous rate of change.",
  concepts:[
    {title:"Limits",body:"A limit describes the value a function approaches as x approaches a given number. Notation: lim(x→c) f(x) = L. The function doesn't need to equal L at x=c — it just needs to approach it.",example:"lim(x→2) (x²−4)/(x−2): direct substitution gives 0/0 (indeterminate). Factor: (x+2)(x−2)/(x−2) = x+2 → lim = 4."},
    {title:"Continuity",body:"A function is continuous at x=c if: (1) f(c) is defined, (2) the limit exists, (3) the limit equals f(c). Discontinuities can be removable (hole), jump, or infinite (asymptote).",example:"f(x)=(x²−4)/(x−2) has a removable discontinuity at x=2 — the hole can be filled."},
    {title:"Average Rate of Change",body:"Average rate of change of f over [a,b] = [f(b)−f(a)]/(b−a). This is the slope of the secant line through (a,f(a)) and (b,f(b)). As b approaches a, we get the instantaneous rate of change (derivative).",example:"f(x)=x² over [1,4]: [f(4)−f(1)]/(4−1) = (16−1)/3 = 15/3 = 5."},
    {title:"Introduction to Derivatives",body:"The derivative f'(x) is the instantaneous rate of change at x. Defined as: f'(x) = lim(h→0) [f(x+h)−f(x)]/h. For polynomials, the power rule gives an easy shortcut: d/dx(xⁿ) = nxⁿ⁻¹.",example:"f(x)=x²: f'(x) = lim(h→0)[(x+h)²−x²]/h = lim(2x+h) = 2x. Power rule: d/dx(x²) = 2x."}
  ],
  formulas:[{name:"Limit Definition of Derivative",formula:"f'(x) = lim(h→0) [f(x+h)−f(x)] / h"},{name:"Power Rule",formula:"d/dx(xⁿ) = nxⁿ⁻¹"},{name:"Average Rate of Change",formula:"[f(b)−f(a)] / (b−a)"}]},
];

// STATE
// ═══════════════════════════════════════════════
let selectedGrade=null, selectedChapter=null, selectedDiff=null;
let questionNum=0, totalQ=10, score=0, streak=0, askedSet=new Set();
let currentProblem=null;

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
// LESSON FUNCTIONS
// ═══════════════════════════════════════════════
function showLesson(){
  if(selectedGrade===null||selectedChapter===null)return;
  showScreen('lesson');
  const cur=CURRICULUM[selectedGrade];
  const ch=cur.chapters[selectedChapter];
  const lesson=LESSONS[selectedGrade]&&LESSONS[selectedGrade][ch.num];
  if(!lesson){
    document.getElementById('lessonTitle').textContent=ch.title;
    document.getElementById('lessonChLabel').textContent=`Grade ${selectedGrade} · Chapter ${ch.num}`;
    document.getElementById('lessonSubtitle').textContent=cur.name+' · '+cur.subtitle;
    document.getElementById('lessonOverview').textContent='Lesson content coming soon for this chapter.';
    document.getElementById('conceptsList').innerHTML='';
    document.getElementById('formulasSection').style.display='none';
    return;
  }
  document.getElementById('lessonChLabel').textContent=`Grade ${selectedGrade} · Chapter ${ch.num}`;
  document.getElementById('lessonTitle').textContent=ch.title;
  document.getElementById('lessonSubtitle').textContent=cur.name+' — '+cur.subtitle;
  document.getElementById('lessonOverview').textContent=lesson.overview;

  // Render concepts
  const cl=document.getElementById('conceptsList');
  cl.innerHTML='';
  (lesson.concepts||[]).forEach(c=>{
    const card=document.createElement('div');
    card.className='concept-card';
    card.innerHTML=`<div class="concept-title">${c.title}</div><div class="concept-body">${c.body}</div><div class="concept-example">${c.example}</div>`;
    cl.appendChild(card);
  });

  // Render formulas
  const fg=document.getElementById('formulasGrid');
  const fs=document.getElementById('formulasSection');
  fg.innerHTML='';
  if(lesson.formulas&&lesson.formulas.length>0){
    fs.style.display='block';
    lesson.formulas.forEach(f=>{
      const row=document.createElement('div');
      row.className='formula-row';
      row.innerHTML=`<span class="formula-name">${f.name}</span><span class="formula-eq">${f.formula}</span>`;
      fg.appendChild(row);
    });
  } else {
    fs.style.display='none';
  }
}

function startPracticeFromLesson(){
  if(selectedDiff){
    startPractice();
  } else {
    // Go back to selection and scroll to difficulty
    showScreen('selection');
    document.getElementById('diffSection').classList.remove('hidden');
    document.getElementById('diffSection').scrollIntoView({behavior:'smooth'});
  }
}

  const pills=document.getElementById('gradePills');
  [6,7,8,9,10,11,12].forEach(g=>{

    btn.dataset.grade=g;

    btn.onclick=()=>selectGrade(g);
    pills.appendChild(btn);
  });
}

  document.getElementById('gradeSubDisplay').textContent=cur.subtitle;

    card.onclick=()=>selectChapter(i,card);
    grid.appendChild(card);
  });
  document.getElementById('chapterSection').classList.remove('hidden');
  document.getElementById('diffSection').classList.add('hidden');
  document.getElementById('actionSection').classList.remove('hidden');
  document.getElementById('studyBtn').textContent=`📖 Study Chapter ${CURRICULUM[selectedGrade].chapters[idx].num}: ${CURRICULUM[selectedGrade].chapters[idx].title}`;
  updateStartBtn();
}

function selectChapter(idx,card){
  selectedChapter=idx;
  document.querySelectorAll('.ch-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  document.getElementById('diffSection').classList.remove('hidden');
  updateStartBtn();
}

function selectDiff(d){
  selectedDiff=d;
  document.querySelectorAll('.diff-pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[data-diff="${d}"]`).classList.add('active');
  updateStartBtn();
}

function updateStartBtn(){
  const btn=document.getElementById('startBtn');
  if(selectedGrade&&selectedChapter!==null&&selectedDiff){
    btn.disabled=false;
    const ch=CURRICULUM[selectedGrade].chapters[selectedChapter];
    btn.textContent=`▶ Practice — ${ch.title} (${selectedDiff})`;
    btn.style.background='';btn.style.border='';btn.style.color='';
  } else {
    btn.disabled=true;
    btn.textContent='Choose a difficulty above to practice';
    btn.style.background='';btn.style.border='';btn.style.color='';
  }
}

// ═══════════════════════════════════════════════
// PRACTICE
// ═══════════════════════════════════════════════
function startPractice(){
  questionNum=0;score=0;streak=0;askedSet=new Set();
  showScreen('practice');
  // Breadcrumb
  const cur=CURRICULUM[selectedGrade];
  const ch=cur.chapters[selectedChapter];
  document.getElementById('breadcrumb').innerHTML=
    `Grade ${selectedGrade} &nbsp;·&nbsp; <span>${cur.name}</span> &nbsp;·&nbsp; Chapter ${ch.num}: ${ch.title} &nbsp;·&nbsp; <span>${selectedDiff}</span>`;
  loadNextQuestion();
}

function loadNextQuestion(){
  if(questionNum>=totalQ){showSummary();return;}
  questionNum++;

  // Reset UI
  const fb=document.getElementById('feedback');
  fb.className='feedback hidden';
  document.getElementById('feedbackIcon').textContent='';
  document.getElementById('feedbackText').textContent='';
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').disabled=false;
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('hintText').style.display='none';
  closeSolution();

  // Generate problem (with dedup)
  const gen=CURRICULUM[selectedGrade].chapters[selectedChapter].gen;
  let p, attempts=0;
  do{p=gen(selectedDiff);attempts++;}
  while(askedSet.has(p.question)&&attempts<15);
  askedSet.add(p.question);
  currentProblem=p;

  // Render
  const c=getBadge(p.topic);
  const badge=document.getElementById('topicBadge');
  badge.textContent=p.topic;
  badge.style.background=c.bg;badge.style.color=c.text;
  document.getElementById('questionText').textContent=p.question;
  document.getElementById('hintText').textContent=p.hint;

  // Solution steps
  const panel=document.getElementById('solutionPanel');
  panel.innerHTML='';
  p.steps.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='solution-step';
    row.innerHTML=`<div class="step-num">${i+1}</div><div>${s}</div>`;
    panel.appendChild(row);
  });
  document.getElementById('showSolBtn').textContent='📋 Show How to Solve This';

  // Progress + streak
  document.getElementById('progressBar').style.width=`${((questionNum-1)/totalQ)*100}%`;
  document.getElementById('scoreDisplay').textContent=`${score} / ${questionNum-1}`;
  const sb=document.getElementById('streakBadge');
  if(streak>=2){sb.classList.remove('hidden');document.getElementById('streakNum').textContent=streak;}
  else sb.classList.add('hidden');

  // Animate card
  const card=document.getElementById('questionCard');
  card.classList.remove('shake');
  void card.offsetWidth;

  document.getElementById('answerInput').focus();
}

function submitAnswer(){
  const raw=document.getElementById('answerInput').value.trim();
  if(!raw)return;
  document.getElementById('answerInput').disabled=true;

  const correct=checkAnswer(raw,currentProblem.answer);
  const fb=document.getElementById('feedback');
  const icon=document.getElementById('feedbackIcon');
  const txt=document.getElementById('feedbackText');

  if(correct){
    score++;streak++;
    fb.className='feedback correct';
    icon.textContent='🎉';
    txt.textContent=`Correct! ${streak>=3?'🔥 On a roll!':streak>=2?'✨ Keep it up!':'Nice work!'}`;
    if(streak>=3)launchConfetti(40);
  } else {
    streak=0;
    fb.className='feedback wrong';
    icon.textContent='💪';
    const ans=currentProblem.answer;
    const display=typeof ans==='number'?ans:ans;
    txt.textContent=`Not quite — the answer is ${display}. Try the next one!`;
    document.getElementById('questionCard').classList.add('shake');
  }

  document.getElementById('scoreDisplay').textContent=`${score} / ${questionNum}`;
  document.getElementById('nextBtn').classList.remove('hidden');

  // Update streak badge
  const sb=document.getElementById('streakBadge');
  if(streak>=2){sb.classList.remove('hidden');document.getElementById('streakNum').textContent=streak;}
  else sb.classList.add('hidden');
}

function checkAnswer(raw,correct){
  // Numeric tolerance check
  const num=parseFloat(raw.replace(/[^0-9.\-/]/g,''));
  if(typeof correct==='number'){
    if(!isNaN(num)&&Math.abs(num-correct)<0.01)return true;
    // Fraction input: "3/4"
    if(raw.includes('/')){
      const parts=raw.split('/');
      if(parts.length===2){
        const v=parseFloat(parts[0])/parseFloat(parts[1]);
        if(Math.abs(v-correct)<0.01)return true;
      }
    }
    return false;
  }
  // String answer
  return raw.toLowerCase().replace(/\s/g,'')=== String(correct).toLowerCase().replace(/\s/g,'');
}

function toggleHint(){
  const h=document.getElementById('hintText');
  h.style.display=h.style.display==='block'?'none':'block';
}

function toggleSolution(){
  const panel=document.getElementById('solutionPanel');
  const btn=document.getElementById('showSolBtn');
  if(panel.classList.contains('open')){
    panel.classList.remove('open');panel.style.display='none';
    btn.textContent='📋 Show How to Solve This';
  } else {
    panel.classList.add('open');panel.style.display='block';
    btn.textContent='▲ Hide Solution';
  }
}
function closeSolution(){
  const panel=document.getElementById('solutionPanel');
  panel.classList.remove('open');panel.style.display='none';
  document.getElementById('showSolBtn').textContent='📋 Show How to Solve This';
}

// ═══════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════
function showSummary(){
  showScreen('summary');
  const pct=Math.round((score/totalQ)*100);
  document.getElementById('summaryPct').textContent=`${pct}%`;
  document.getElementById('statCorrect').textContent=score;
  document.getElementById('statWrong').textContent=totalQ-score;
  const ch=CURRICULUM[selectedGrade].chapters[selectedChapter];
  document.getElementById('summaryLabel').textContent=`Chapter ${ch.num}: ${ch.title} — ${selectedDiff}`;

  // Stars
  const stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  ['star1','star2','star3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.remove('lit');
    if(i<stars)setTimeout(()=>el.classList.add('lit'),(i+1)*250);
  });

  // Count-up
  let n=0;
  const target=pct;
  const el=document.getElementById('summaryPct');
  const step=Math.ceil(target/30);
  const iv=setInterval(()=>{n=Math.min(n+step,target);el.textContent=`${n}%`;if(n>=target)clearInterval(iv);},40);

  if(pct>=80)launchConfetti(60);
}

function retrySession(){
  questionNum=0;score=0;streak=0;askedSet=new Set();
  showScreen('practice');
  loadNextQuestion();
}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(name){
  document.getElementById('selectionScreen').classList.toggle('hidden',name!=='selection');
  document.getElementById('practiceScreen').classList.toggle('hidden',name!=='practice');
  document.getElementById('summaryScreen').classList.toggle('hidden',name!=='summary');
  document.getElementById('lessonScreen').classList.toggle('hidden',name!=='lesson');
  document.getElementById('backBtn').classList.toggle('hidden',name==='selection');
}
function resetToSelection(){showScreen('selection');}

// ═══════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════
function launchConfetti(count=50){
  const colors=['#6366f1','#8b5cf6','#10b981','#f59e0b','#f43f5e','#ec4899','#06b6d4','#f97316','#84cc16'];
  const wrap=document.getElementById('confettiWrap');
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const sz=randInt(6,12);
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${pick(colors)};left:${Math.random()*100}%;top:0;opacity:${.6+Math.random()*.4};animation-duration:${1.2+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;`;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}
